<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSE Vision - Object Measurement System</title>
  
  <!-- Favicon - PSE Logo -->
  <link rel="icon" type="image/png" href="/Icon/LOGO-NEW.png">
  <link rel="shortcut icon" type="image/png" href="/Icon/LOGO-NEW.png">
  <link rel="apple-touch-icon" href="/Icon/LOGO-NEW.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Set theme before first paint to avoid flash of wrong theme -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('pse-vision-theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
